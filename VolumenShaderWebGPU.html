<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="user-scalable=no" />
    <title>volumeshader_webgpu</title>
    <style>
        body {
            background: #131115;
            margin: 0;
        }

        #c1 {
            background: #fbf7fe;
        }

        #btn {
            position: fixed;
            left: 0px;
            top: 0px;
        }

        #c1 {
            position: fixed;
            left: 0px;
            top: 0px;
        }

        #config {
            position: fixed;
            left: 0px;
            top: 30px;
            display: none;
        }

        #hud {
            position: fixed;
            right: 8px;
            top: 8px;
            padding: 6px 8px;
            background: rgba(0, 0, 0, 0.58);
            color: #d9f7e6;
            border: 1px solid rgba(180, 255, 220, 0.28);
            border-radius: 6px;
            font: 12px/1.2 Consolas, Monaco, monospace;
            white-space: pre;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body style="overflow-x:hidden;overflow-y:hidden">
    <canvas id="c1" width="1024" height="1024">
        <span>Your browser does not support canvas</span>
    </canvas>

    <button id="btn">CONFIG</button>
    <div id="config">
        <textarea id="kernel" cols="30" rows="10"></textarea>
        <br />
        <button id="apply">APPLY</button>
        <button id="cancle">CANCLE</button>
    </div>

    <div id="hud">FPS: --\nMS: --\nScale: --</div>

    <script id="kernelSource" type="text/plain">fn kernal(ver: vec3<f32>) -> f32 {
    var a = ver;
    var b: f32 = 0.0;
    var c: f32 = 0.0;
    var d: f32 = 0.0;

    for (var i: i32 = 0; i < 5; i = i + 1) {
        b = length(a);
        c = atan2(a.y, a.x) * 8.0;
        let safeB = max(b, 0.0001);
        d = acos(clamp(a.z / safeB, -1.0, 1.0)) * 8.0;
        let sd = sin(d);
        let cd = cos(d);
        let sc = sin(c);
        let cc = cos(c);
        let b2 = b * b;
        let b4 = b2 * b2;
        b = b4 * b4;

        a = vec3<f32>(
            b * sd * cc,
            b * sd * sc,
            b * cd
        ) + ver;

        if (b > 6.0) {
            break;
        }
    }

    return 4.0 - dot(a, a);
}
</script>

    <script>
        let cx = 0;
        let cy = 0;
        let mx = 0;
        let my = 0;
        let mx1 = 0;
        let my1 = 0;
        let lasttimen = 0;
        let ml = 0;
        let mr = 0;
        let mm = 0;

        let len = 1.6;
        let ang1 = 2.8;
        let ang2 = 0.4;
        let cenx = 0.0;
        let ceny = 0.0;
        let cenz = 0.0;

        let KERNEL = document.getElementById("kernelSource").textContent;

        let canvas;
        let adapter;
        let device;
        let context;
        let format;
        let pipeline;
        let uniformBuffer;
        let bindGroup;
        let frameTime = 0.0;
        let dynamicResScale = 1.0;
        let lastFrameNow = 0.0;
        let avgFrameMs = 16.7;
        let frameAdjustCounter = 0;
        let hudElement;
        let lastHudUpdate = 0.0;
        let qualityAdjustCounter = 0;
        let qualityChangeCooldown = 0.0;
        let pipelineRebuildPending = false;
        const DEBUG_SOLID_COLOR = false;
        const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

        const PERF_PROFILE = IS_IOS
            ? {
                stepSize: 0.0026,
                solver: 6,
                maxSteps: 640,
                fastNormal: 1,
                maxDpr: 1.25,
                resScale: 0.88
            }
            : {
                stepSize: 0.002,
                solver: 8,
                maxSteps: 1000,
                fastNormal: 0,
                maxDpr: 2.0,
                resScale: 1.0
            };

        const IOS_SHADER_QUALITY = [
            { name: "L", stepSize: 0.0034, solver: 4, maxSteps: 420, fastNormal: 1 },
            { name: "M", stepSize: 0.0030, solver: 5, maxSteps: 520, fastNormal: 1 },
            { name: "H", stepSize: PERF_PROFILE.stepSize, solver: PERF_PROFILE.solver, maxSteps: PERF_PROFILE.maxSteps, fastNormal: PERF_PROFILE.fastNormal }
        ];
        let shaderQualityIndex = IS_IOS ? 2 : 0;
        let activeShaderProfile = IS_IOS
            ? { ...IOS_SHADER_QUALITY[shaderQualityIndex] }
            : {
                name: "H",
                stepSize: PERF_PROFILE.stepSize,
                solver: PERF_PROFILE.solver,
                maxSteps: PERF_PROFILE.maxSteps,
                fastNormal: PERF_PROFILE.fastNormal
            };

        function fitMain() {
            const size = Math.max(1, Math.min(window.innerWidth, window.innerHeight));
            cx = size;
            cy = size;
            const c = document.getElementById("c1");
            c.style.width = size + "px";
            c.style.height = size + "px";

            if (c && device) {
                const dpr = Math.min(window.devicePixelRatio || 1, PERF_PROFILE.maxDpr);
                const internal = Math.max(256, Math.floor(size * dpr * PERF_PROFILE.resScale * dynamicResScale));
                if (c.width !== internal || c.height !== internal) {
                    c.width = internal;
                    c.height = internal;
                }
            }
        }

        function updateHud(now) {
            if (!hudElement) {
                return;
            }
            if (now - lastHudUpdate < 250.0) {
                return;
            }

            const fps = 1000.0 / Math.max(1.0, avgFrameMs);
            const internalScale = PERF_PROFILE.resScale * dynamicResScale;
            hudElement.textContent =
                "FPS: " + fps.toFixed(1) + "\n" +
                "MS: " + avgFrameMs.toFixed(2) + "\n" +
                "Scale: " + internalScale.toFixed(2) + "\n" +
                "Q: " + activeShaderProfile.name + (IS_IOS ? " iOS" : "");
            lastHudUpdate = now;
        }

        async function requestShaderQuality(index) {
            if (!IS_IOS) {
                return;
            }
            if (index < 0 || index >= IOS_SHADER_QUALITY.length) {
                return;
            }
            if (index === shaderQualityIndex || pipelineRebuildPending) {
                return;
            }

            pipelineRebuildPending = true;
            const prevIndex = shaderQualityIndex;
            const prevProfile = activeShaderProfile;
            const nextProfile = IOS_SHADER_QUALITY[index];

            shaderQualityIndex = index;
            activeShaderProfile = { ...nextProfile };

            try {
                await createPipelineWithKernel(KERNEL);
            } catch (err) {
                shaderQualityIndex = prevIndex;
                activeShaderProfile = prevProfile;
                console.error("Shader quality switch failed:", err);
            } finally {
                pipelineRebuildPending = false;
            }
        }

        function buildShaderSource(kernelCode) {
            const debugSnippet = DEBUG_SOLID_COLOR
                ? "return vec4<f32>(0.0, 0.9, 0.4, 1.0);"
                : "";

            return `
struct Camera {
    right: vec3<f32>,
    _pad0: f32,
    forward: vec3<f32>,
    _pad1: f32,
    up: vec3<f32>,
    _pad2: f32,
    origin: vec3<f32>,
    _pad3: f32,
    x: f32,
    y: f32,
    len: f32,
    time: f32,
};

@group(0) @binding(0)
var<uniform> camera: Camera;

struct VSOut {
    @builtin(position) pos: vec4<f32>,
    @location(0) dir: vec3<f32>,
};

@vertex
fn vsMain(@builtin(vertex_index) vid: u32) -> VSOut {
    var positions = array<vec2<f32>, 6>(
        vec2<f32>(-1.0, -1.0),
        vec2<f32>(1.0, -1.0),
        vec2<f32>(1.0, 1.0),
        vec2<f32>(-1.0, -1.0),
        vec2<f32>(1.0, 1.0),
        vec2<f32>(-1.0, 1.0)
    );

    let p = positions[vid];
    var out: VSOut;
    out.pos = vec4<f32>(p, 0.0, 1.0);
    out.dir = camera.forward + camera.right * p.x * camera.x + camera.up * p.y * camera.y;
    return out;
}

${kernelCode}

const SOLVER: i32 = ${activeShaderProfile.solver};
const STEP_SIZE: f32 = ${activeShaderProfile.stepSize};
const MAX_STEPS: i32 = ${activeShaderProfile.maxSteps};
const FAST_NORMAL: i32 = ${activeShaderProfile.fastNormal};
const BOUND_RADIUS: f32 = 2.8;

@fragment
fn fsMain(@location(0) dir: vec3<f32>) -> @location(0) vec4<f32> {
    ${debugSnippet}

    let d = normalize(dir);
    var color = vec3<f32>(
        0.12 + 0.55 * max(0.0, d.y),
        0.10 + 0.35 * max(0.0, d.y),
        0.20 + 0.65 * max(0.0, -d.z)
    );
    var sign: i32 = 0;

    let distStep = STEP_SIZE * camera.len;
    let dirStep = d * distStep;
    let maxDistance = 2.0 * camera.len;

    // Skip rays that cannot reach the fractal volume and start marching near entry.
    let oc = camera.origin;
    let bRay = dot(oc, d);
    let cRay = dot(oc, oc) - BOUND_RADIUS * BOUND_RADIUS;
    let h = bRay * bRay - cRay;
    if (h <= 0.0) {
        return vec4<f32>(color, 1.0);
    }
    let sqrtH = sqrt(h);
    let tEnter = max(0.0, -bRay - sqrtH);
    let tExit = -bRay + sqrtH;
    if (tExit <= 0.0) {
        return vec4<f32>(color, 1.0);
    }
    let marchEnd = min(maxDistance, tExit);

    var v: f32 = 0.0;
    var marchDist: f32 = max(distStep, tEnter + distStep);
    var ver = camera.origin + d * marchDist;
    var v1: f32 = kernal(ver - dirStep);

    var r1: f32 = 0.0;
    var r2: f32 = 0.0;
    var r3: f32 = 0.0;
    var r4: f32 = 0.0;

    var m3: f32 = 0.0;

    for (var k: i32 = 2; k < MAX_STEPS; k = k + 1) {
        if (marchDist > marchEnd) {
            break;
        }
        v = kernal(ver);

        if (v > 0.0 && v1 < 0.0) {
            r1 = marchDist - distStep;
            r2 = marchDist;

            for (var l: i32 = 0; l < SOLVER; l = l + 1) {
                r3 = (r1 + r2) * 0.5;
                m3 = kernal(camera.origin + d * r3);

                if (m3 > 0.0) {
                    r2 = r3;
                } else {
                    r1 = r3;
                }
            }

            if (r3 < 2.0 * camera.len) {
                sign = 1;
                break;
            }
        }

        v1 = v;
        ver = ver + dirStep;
        marchDist = marchDist + distStep;
    }

    if (sign == 1) {
        ver = camera.origin + d * r3;
        r1 = dot(ver, ver);

        let eps = max(0.00002, r3 * 0.00030);
        var n = vec3<f32>(0.0, 0.0, 0.0);

        if (FAST_NORMAL == 1) {
            let e1 = camera.right + camera.up + camera.forward;
            let e2 = camera.right - camera.up - camera.forward;
            let e3 = -camera.right + camera.up - camera.forward;
            let e4 = -camera.right - camera.up + camera.forward;
            n =
                e1 * kernal(ver + e1 * eps) +
                e2 * kernal(ver + e2 * eps) +
                e3 * kernal(ver + e3 * eps) +
                e4 * kernal(ver + e4 * eps);
        } else {
            n.x = kernal(ver - camera.right * eps) - kernal(ver + camera.right * eps);
            n.y = kernal(ver - camera.up * eps) - kernal(ver + camera.up * eps);
            n.z = kernal(ver + camera.forward * eps) - kernal(ver - camera.forward * eps);
        }
        let nLen = length(n);
        if (nLen > 0.000001) {
            n = n / nLen;
        } else {
            n = -d;
        }

        let reflectionVec = reflect(d, n);
        r3 = dot(reflectionVec, vec3<f32>(0.276, 0.920, 0.276));
        r4 = dot(n, vec3<f32>(0.276, 0.920, 0.276));

        r3 = max(0.0, r3);
        r3 = pow(r3, 4.0) * 0.45 + r4 * 0.25 + 0.3;

        color.r = sin(r1 * 10.0) * 0.5 + 0.5;
        color.g = sin(r1 * 10.0 + 2.05) * 0.5 + 0.5;
        color.b = sin(r1 * 10.0 - 2.05) * 0.5 + 0.5;
        color = color * r3;
    }

    // Guard against NaN/Inf paths turning the frame black on some drivers.
    if (!all(color == color)) {
        color = vec3<f32>(1.0, 0.0, 0.0);
    }
    color = clamp(color, vec3<f32>(0.0), vec3<f32>(1.0));

    return vec4<f32>(color, 1.0);
}
`;
        }

        async function createPipelineWithKernel(kernelCode) {
            const shaderSource = buildShaderSource(kernelCode);
            const module = device.createShaderModule({ code: shaderSource });

            const info = await module.getCompilationInfo();
            const errors = info.messages.filter(function (m) {
                return m.type === "error";
            });

            if (errors.length > 0) {
                const text = errors
                    .map(function (e) {
                        return "Line " + e.lineNum + ":" + e.linePos + " - " + e.message;
                    })
                    .join("\n");
                throw new Error(text);
            }

            const nextPipeline = device.createRenderPipeline({
                layout: "auto",
                vertex: {
                    module: module,
                    entryPoint: "vsMain"
                },
                fragment: {
                    module: module,
                    entryPoint: "fsMain",
                    targets: [{ format: format }]
                },
                primitive: {
                    topology: "triangle-list"
                }
            });

            const nextBindGroup = device.createBindGroup({
                layout: nextPipeline.getBindGroupLayout(0),
                entries: [
                    {
                        binding: 0,
                        resource: {
                            buffer: uniformBuffer
                        }
                    }
                ]
            });

            pipeline = nextPipeline;
            bindGroup = nextBindGroup;
        }

        function updateUniforms() {
            const rightX = Math.sin(ang1);
            const rightY = 0.0;
            const rightZ = -Math.cos(ang1);

            const upX = -Math.sin(ang2) * Math.cos(ang1);
            const upY = Math.cos(ang2);
            const upZ = -Math.sin(ang2) * Math.sin(ang1);

            const forwardX = -Math.cos(ang1) * Math.cos(ang2);
            const forwardY = -Math.sin(ang2);
            const forwardZ = -Math.sin(ang1) * Math.cos(ang2);

            const originX = len * Math.cos(ang1) * Math.cos(ang2) + cenx;
            const originY = len * Math.sin(ang2) + ceny;
            const originZ = len * Math.sin(ang1) * Math.cos(ang2) + cenz;

            const x = cx * 2.0 / (cx + cy);
            const y = cy * 2.0 / (cx + cy);

            const data = new Float32Array(20);
            data.set([rightX, rightY, rightZ, 0.0], 0);
            data.set([forwardX, forwardY, forwardZ, 0.0], 4);
            data.set([upX, upY, upZ, 0.0], 8);
            data.set([originX, originY, originZ, 0.0], 12);
            data.set([x, y, len, frameTime], 16);

            device.queue.writeBuffer(uniformBuffer, 0, data.buffer, data.byteOffset, data.byteLength);
        }

        function draw() {
            if (!pipeline) {
                return;
            }

            updateUniforms();

            const encoder = device.createCommandEncoder();
            const view = context.getCurrentTexture().createView();

            const pass = encoder.beginRenderPass({
                colorAttachments: [
                    {
                        view: view,
                        clearValue: { r: 0.06, g: 0.06, b: 0.08, a: 1.0 },
                        loadOp: "clear",
                        storeOp: "store"
                    }
                ]
            });

            pass.setPipeline(pipeline);
            pass.setBindGroup(0, bindGroup);
            pass.draw(6, 1, 0, 0);
            pass.end();

            device.queue.submit([encoder.finish()]);
        }

        function ontimer(now) {
            if (document.hidden) {
                lastFrameNow = now;
                window.requestAnimationFrame(ontimer);
                return;
            }

            if (lastFrameNow > 0.0) {
                const dt = Math.max(1.0, now - lastFrameNow);
                avgFrameMs = avgFrameMs * 0.9 + dt * 0.1;
                frameTime += dt * 0.001;

                if (IS_IOS) {
                    frameAdjustCounter += 1;
                    if (frameAdjustCounter >= 20) {
                        let changed = false;
                        if (avgFrameMs > 22.0 && dynamicResScale > 0.72) {
                            dynamicResScale = Math.max(0.72, dynamicResScale - 0.06);
                            changed = true;
                        } else if (avgFrameMs < 17.0 && dynamicResScale < 1.0) {
                            dynamicResScale = Math.min(1.0, dynamicResScale + 0.04);
                            changed = true;
                        }

                        if (changed) {
                            fitMain();
                        }
                        frameAdjustCounter = 0;
                    }

                    qualityAdjustCounter += 1;
                    if (qualityAdjustCounter >= 30 && now >= qualityChangeCooldown) {
                        if (avgFrameMs > 24.5 && shaderQualityIndex > 0) {
                            requestShaderQuality(shaderQualityIndex - 1);
                            qualityChangeCooldown = now + 4000.0;
                        } else if (avgFrameMs < 16.0 && shaderQualityIndex < IOS_SHADER_QUALITY.length - 1) {
                            requestShaderQuality(shaderQualityIndex + 1);
                            qualityChangeCooldown = now + 6000.0;
                        }
                        qualityAdjustCounter = 0;
                    }
                }
            }
            lastFrameNow = now;
            updateHud(now);

            ang1 += 0.01;
            draw();
            window.requestAnimationFrame(ontimer);
        }

        function setupInputHandlers() {
            document.addEventListener(
                "mousedown",
                function (ev) {
                    if (ev.button === 0) {
                        ml = 1;
                        mm = 0;
                    }
                    if (ev.button === 2) {
                        mr = 1;
                        mm = 0;
                    }
                    mx = ev.clientX;
                    my = ev.clientY;
                },
                false
            );

            document.addEventListener(
                "mouseup",
                function (ev) {
                    if (ev.button === 0) {
                        ml = 0;
                    }
                    if (ev.button === 2) {
                        mr = 0;
                    }
                },
                false
            );

            document.addEventListener(
                "mousemove",
                function (ev) {
                    if (ml === 1) {
                        ang1 += (ev.clientX - mx) * 0.002;
                        ang2 += (ev.clientY - my) * 0.002;
                        if (ev.clientX !== mx || ev.clientY !== my) {
                            mm = 1;
                        }
                    }

                    if (mr === 1) {
                        const l = (len * 4.0) / (cx + cy);
                        cenx += l * (-(ev.clientX - mx) * Math.sin(ang1) - (ev.clientY - my) * Math.sin(ang2) * Math.cos(ang1));
                        ceny += l * ((ev.clientY - my) * Math.cos(ang2));
                        cenz += l * ((ev.clientX - mx) * Math.cos(ang1) - (ev.clientY - my) * Math.sin(ang2) * Math.sin(ang1));
                        if (ev.clientX !== mx || ev.clientY !== my) {
                            mm = 1;
                        }
                    }

                    mx = ev.clientX;
                    my = ev.clientY;
                },
                false
            );

            document.addEventListener(
                "wheel",
                function (ev) {
                    ev.preventDefault();
                    len *= Math.exp(ev.deltaY * 0.001);
                },
                { passive: false }
            );

            document.addEventListener(
                "touchstart",
                function (ev) {
                    const n = ev.touches.length;
                    if (n === 1) {
                        mx = ev.touches[0].clientX;
                        my = ev.touches[0].clientY;
                    } else if (n === 2) {
                        mx = ev.touches[0].clientX;
                        my = ev.touches[0].clientY;
                        mx1 = ev.touches[1].clientX;
                        my1 = ev.touches[1].clientY;
                    }
                    lasttimen = n;
                },
                false
            );

            document.addEventListener(
                "touchend",
                function (ev) {
                    const n = ev.touches.length;
                    if (n === 1) {
                        mx = ev.touches[0].clientX;
                        my = ev.touches[0].clientY;
                    } else if (n === 2) {
                        mx = ev.touches[0].clientX;
                        my = ev.touches[0].clientY;
                        mx1 = ev.touches[1].clientX;
                        my1 = ev.touches[1].clientY;
                    }
                    lasttimen = n;
                },
                false
            );

            document.addEventListener(
                "touchmove",
                function (ev) {
                    ev.preventDefault();
                    const n = ev.touches.length;

                    if (n === 1 && lasttimen === 1) {
                        const oEvent = ev.touches[0];
                        ang1 += (oEvent.clientX - mx) * 0.002;
                        ang2 += (oEvent.clientY - my) * 0.002;
                        mx = oEvent.clientX;
                        my = oEvent.clientY;
                    } else if (n === 2) {
                        const t0 = ev.touches[0];
                        const t1 = ev.touches[1];

                        let l = (len * 2.0) / (cx + cy);
                        cenx += l * (-(t0.clientX + t1.clientX - mx - mx1) * Math.sin(ang1) - (t0.clientY + t1.clientY - my - my1) * Math.sin(ang2) * Math.cos(ang1));
                        ceny += l * ((t0.clientY + t1.clientY - my - my1) * Math.cos(ang2));
                        cenz += l * ((t0.clientX + t1.clientX - mx - mx1) * Math.cos(ang1) - (t0.clientY + t1.clientY - my - my1) * Math.sin(ang2) * Math.sin(ang1));

                        const l1 = Math.sqrt((mx - mx1) * (mx - mx1) + (my - my1) * (my - my1) + 1.0);

                        mx = t0.clientX;
                        my = t0.clientY;
                        mx1 = t1.clientX;
                        my1 = t1.clientY;

                        l = Math.sqrt((mx - mx1) * (mx - mx1) + (my - my1) * (my - my1) + 1.0);
                        len *= l1 / l;
                    }

                    lasttimen = n;
                },
                { passive: false }
            );

            document.oncontextmenu = function (event) {
                if (mm === 1) {
                    event.preventDefault();
                }
            };
        }

        function setupConfigHandlers() {
            document.getElementById("kernel").value = KERNEL;

            document.getElementById("btn").addEventListener("click", function () {
                const state = this.innerText === "CONFIG";
                this.innerText = state ? "HIDE" : "CONFIG";
                document.getElementById("config").style.display = state ? "inline" : "none";
            });

            document.getElementById("apply").addEventListener("click", async function () {
                const nextKernel = document.getElementById("kernel").value;
                try {
                    await createPipelineWithKernel(nextKernel);
                    KERNEL = nextKernel;
                } catch (err) {
                    alert(String(err.message || err));
                }
            });

            document.getElementById("cancle").addEventListener("click", function () {
                document.getElementById("kernel").value = KERNEL;
            });
        }

        async function initWebGPU() {
            if (!navigator.gpu) {
                const useFallback = confirm(
                    "WebGPU API is not available in this Safari session.\n\nOpen the WebGL2 version instead?"
                );
                if (useFallback) {
                    window.location.href = "./VolumenShaderWebGL2.html";
                }
                return;
            }

            canvas = document.getElementById("c1");
            context = canvas.getContext("webgpu");
            if (!context) {
                alert("Could not get a WebGPU context.");
                return;
            }

            adapter = await navigator.gpu.requestAdapter();
            if (!adapter) {
                alert("No suitable GPU adapter was found.");
                return;
            }

            device = await adapter.requestDevice();
            device.addEventListener("uncapturederror", function (event) {
                console.error("WebGPU uncaptured error:", event.error);
                alert("WebGPU runtime error: " + event.error.message);
            });
            format = navigator.gpu.getPreferredCanvasFormat();

            context.configure({
                device: device,
                format: format,
                alphaMode: "opaque"
            });
            fitMain();

            uniformBuffer = device.createBuffer({
                size: 80,
                usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST
            });

            await createPipelineWithKernel(KERNEL);
        }

        window.onresize = function () {
            fitMain();
        };

        window.onload = async function () {
            fitMain();
            hudElement = document.getElementById("hud");
            setupInputHandlers();
            setupConfigHandlers();

            try {
                await initWebGPU();
                draw();
                window.requestAnimationFrame(ontimer);
            } catch (err) {
                console.error(err);
                alert("WebGPU init error: " + String(err.message || err));
            }
        };
    </script>
</body>
</html>
